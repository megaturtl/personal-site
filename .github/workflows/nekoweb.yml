name: Deploy to nekoweb

on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # The checkout step copies your repo into the action runner. Important!
    - uses: actions/checkout@v4
    # Set up any tools and build steps here
    # This example uses a Node.js toolchain to build a site
    # If you don't need Node.js to build your site, you can omit this.
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    # If you have a different build process, replace this with your own build steps
    - name: Install deps and build
      run: |
        npm i
        npm run build
    # When the dist_dir is ready, deploy it to nekoweb
    # Here we deploy the folder named `public`
    - name: deploy2nekoweb
      uses: deploy2nekoweb/deploy2nekoweb@v4
      with:
        nekoweb-api-key: ${{ secrets.NEKOWEB_API_KEY }}
        nekoweb-cookie: ${{ secrets.NEKOWEB_COOKIE }}
        nekoweb-folder: 'site'
        directory: 'public'